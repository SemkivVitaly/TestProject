; PlatformIO Project Configuration File
;
; ЧТО ЭТОТ ФАЙЛ ДЕЛАЕТ:
;   Задаёт платформу (ESP32), плату (esp32s3box), фреймворк (Arduino), библиотеки и шаги сборки.
;   При запуске "Build" PlatformIO: 1) выполняет extra_scripts (embed_bridge_ui.py), 2) компилирует src/,
;   3) линкует с lib_deps. При "Upload" — прошивает скомпилированную прошивку в плату через esptool.
;
; ДОКУМЕНТАЦИЯ: https://docs.platformio.org/page/projectconf.html

[env:esp32s3box]
; Платформа и плата: espressif32 — официальная поддержка ESP32; esp32s3box — конкретная плата (ESP32-S3-Box).
platform = espressif32
board = esp32s3box
; Фреймворк: Arduino — API как в Arduino IDE (Serial, WiFi, и т.д.).
framework = arduino
debug_tool = esp-builtin
upload_protocol = esptool
; Уровень отладочных сообщений (0–5); -I include — добавить папку include в путь поиска заголовков (для bridge_ui_embed.h).
build_flags = -DCORE_DEBUG_LEVEL=2 -I include
; Файловая система в прошивке: LittleFS — для загрузки данных (data/) отдельно через "Upload Filesystem Image").
board_build.filesystem = littlefs
; Перед каждой сборкой запустить скрипт: он читает data/index.html и генерирует include/bridge_ui_embed.h (встраивание веб-интерфейса в прошивку).
extra_scripts = pre:tools/embed_bridge_ui.py
; Зависимости: ESP32Servo — работа с сервоприводом; MAVLink — разбор/сборка пакетов протокола MAVLink.
lib_deps = 
	madhephaestus/ESP32Servo@^3.1.3
	okalachev/MAVLink@^2.0.27
; Скорость последовательного порта для монитора (должна совпадать с Serial.begin(115200) в коде).
monitor_speed = 115200
monitor_filters = time,log2file,esp32_exception_decoder,default
